# MkDocs configuration for Taichi WIKI (English)
# ============================================================================
# Builds a beautiful static documentation site from the Taichi Wiki vault.
# Deploys to GitHub Pages automatically via .github/workflows/deploy.yml
# ============================================================================

site_name: 🌿 Taichi WIKI
site_description: Open encyclopedia of Tai Chi Chuan — English
site_author: Henry Phạm

# The URL where the site will be hosted
site_url: https://henryPhamDuc.github.io/taichi-wiki-en/

# Use the directory 'docs/' as source
docs_dir: docs
site_dir: site
# Don't build archived/raw exports
exclude_docs: |

# Theme: Material
theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.tabs.link
    - content.tooltips
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Light mode
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github
    logo: material/yin-yang

extra_css:
  - assets/taichi-extra.css

# Plugins
plugins:
  - search:
      lang: en
      separator: '[\s\-\.\_]+'

# Markdown extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.superfences:
        custom_fences:
          - name: mermaid
            class: mermaid
            format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.smartsymbols
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.caret

